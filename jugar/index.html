<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Games</title>
    <link rel="icon" href="https://legu.veho.com.au/legu-rs.png">
    <style>
        :root {
            --bg-color: #1a1f1a;
            --surface-color: #222822;
            --primary-green: #3fdc85;
            --text-main: #b7c8b7;
            --text-dim: #6f7a6f;
            --button-bg: #2c332c;
            --button-hover: #3a463a;
            --font-family: sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-family);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
        }

        h1 {
            font-size: 3rem;
            color: var(--primary-green);
            margin-bottom: 1.5rem;
            text-transform: lowercase;
        }

        .list {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .item {
            background-color: var(--surface-color);
            padding: 1rem;
            border-radius: 6px;
        }

        .item a {
            color: var(--primary-green);
            text-decoration: none;
            font-size: 1.2rem;
        }

        .item p {
            color: var(--text-dim);
            margin-top: 0.3rem;
        }
    </style>
</head>
<body>

<h1>games</h1>

<div class="list" id="list"></div>

<script>
    fetch("/jugar/list.json")
        .then(r => r.json())
        .then(data => {
            const list = document.getElementById("list");
            data.forEach(item => {
                const div = document.createElement("div");
                div.className = "item";
                div.innerHTML = `<a href="${item.url}">${item.name}</a><p>${item.desc}</p>`;
                list.appendChild(div);
            });
        });
</script>

</body>
</html>
